# ======================== 基础配置 (Global Settings) ========================

# 日志输出等级。可选值: "debug" (输出详细运行日志) 或 "info" (仅输出运行结果)
log_level: "info"

# 随机睡眠秒数范围。可选值0-600，单位为秒，不填默认120
RANDOM_SLEEP_SECS_RANGE: 120

# 仅Docker生效，容器化环境下的定时任务触发周期 (Cron 表达式)。默认配置为每天凌晨 1:00 执行
cron: "0 1 * * *"

# ======================== 账户配置 (User Configuration) ========================
# 可配置多个账户，按需增加列表项即可
# 账户为自定义标识名称，仅用于日志输出与消息通知区分
# game_type: 0表示都签(默认)，1表示只签明日方舟，2表示只签终末地

users:
  - nickname: "我的大号"
    token: "这里填入教程中获取的Token"
    game_type: 0

#  - nickname: "我的小号"
#    token: "这里填入另一个Token"
#    game_type: 0

# ======================== 消息推送配置 (Notification Settings) ========================
# 填写相应渠道的参数即可启用对应推送服务。不需要使用的渠道请保持对应参数为空 ("")。

notify:
  # ---------- Qmsg 酱 ----------
  qmsg:
    # Qmsg 推送密钥
    key: ""
    # 自定义 API 接口地址 (可选配置)
    # base_url: "https://qmsg.zendee.cn"

  # ---------- OneBot V11 标准协议 (NapCat / go-cqhttp 等) ----------
  # 支持同时下发私聊与群聊消息，目标 ID 均支持配置多个
  onebot:
    # OneBot HTTP 接口地址，例如: "http://127.0.0.1:3000"
    url: ""
    # HTTP API 鉴权密钥 (未开启鉴权请留空)
    access_token: ""
    # 接收私聊消息的 QQ 号列表
    private_ids:
      # - 123456789
      # - 987654321
    # 接收群聊消息的 QQ 群号列表
    group_ids:
      # - 111222333
      # - 444555666

  # ---------- 邮件推送 (SMTP) ----------
  email:
    # SMTP 服务器地址，例如: "smtp.qq.com"
    smtp_host: ""
    # SMTP 服务器端口，SSL 协议一般为 465，STARTTLS 协议一般为 587
    smtp_port: 465
    # 是否启用 SSL 加密连接
    use_ssl: true
    # 邮箱账号 (通常为完整的邮箱地址)
    username: ""
    # 邮箱登录密码或第三方客户端授权码
    password: ""
    # 发件人地址 (如保持为空，则默认使用 username 作为发件人)
    sender: ""
    # 接收通知的目标邮箱地址
    receiver: ""

  # ---------- 企业微信群机器人 ----------
  wecom:
    # 企业微信群机器人 Webhook 完整地址
    webhook_url: ""

  # ---------- 微信服务号 (基于公众号模板消息) ----------
  wechat_mp:
    # 微信公众号 AppID
    app_id: ""
    # 微信公众号 AppSecret
    app_secret: ""
    # 微信公众号模板消息 ID
    template_id: ""
    # 接收消息用户的 OpenID
    open_id: ""

  # ---------- Server酱 (Turbo版) ----------
  serverchan:
    # Server酱 SendKey 通道密钥
    send_key: ""

  # ---------- Server酱³ ----------
  serverchan3:
    # 单个 SendKey（格式为 sctp{uid}t...，与 Turbo 版 SCT key 不通用）
    # 可在 https://sc3.ft07.com/sendkey 获取
    send_key: ""
    # 多用户推送：使用 send_keys 列表代替 send_key（两者填一个即可）
    # send_keys:
    #   - "sctp123tXXXXXXXXXXXXXXXX"
    #   - "sctp456tYYYYYYYYYYYYYYYY"

  # ---------- Bark ----------
  bark:
    # Bark 设备 Key，可在 Bark App 中查看
    key: ""
    # 多设备推送时可使用 device_keys 列表代替 key
    # device_keys:
    #   - "设备Key1"
    #   - "设备Key2"
    # 自建 Bark Server 地址；使用官方服务时保持默认即可
    base_url: "https://api.day.app"
    # 通知分组名称 (可选)
    group: "Skland"
    # 通知铃声名称 (可选)
    sound: ""
    # 通知图标 URL，仅 iOS 15 或更高版本支持 (可选)
    icon: ""
    # 点击通知时跳转的 URL (可选)
    url: ""
    # 通知级别，可选值: critical、active、timeSensitive、passive
    level: ""

  # ---------- Telegram Bot ----------
  telegram:
    # 机器人的 Token
    bot_token: ""
    # 接收通知的用户或频道 ID
    chat_id: ""
    # 自定义 API 代理地址 (可选配置)
    base_url: "https://api.telegram.org"

  # ---------- 自定义 Webhook ----------
  custom_webhook:
    # Webhook 完整触发地址
    url: ""
    # HTTP 请求方法，支持 POST, GET, PUT
    method: "POST"
    # 自定义请求头 (键值对格式)。未指定 Content-Type 时，默认按 application/json 发送
    headers:
      Content-Type: "application/json"
      # Authorization: "Bearer xxxxxxxx"
    # 请求体模板。支持字典对象或纯字符串。
    # 使用 {{message}} 作为推送内容的占位符，程序运行中会自动进行替换。
    # 如果 HTTP 方法为 GET，此处的字典将作为 URL Param 参数拼接。
    body_template:
      msgtype: "text"
      text:
        content: "{{message}}"

    # ===================================================
    # 【配置示例 1：通过 GET 方法调用 Telegram API】
    # ===================================================
    # url: "https://api.telegram.org/bot1234567890:xxxxxx_xxx_xxxxxxxxxxxx/sendMessage"
    # method: "GET"
    # headers: {}
    # body_template:
    #   chat_id: "123456789"
    #   text: "{{message}}"

    # ===================================================
    # 【配置示例 2：通过 POST 调用 OneBot V11 (QQ机器人) 并带 Token 鉴权】
    # ===================================================
    # url: "https://qqbot.yourdomain.com/send_private_msg"
    # method: "POST"
    # headers:
    #   Content-Type: "application/json"
    #   Authorization: "Bearer 1bg2xxxxxxxxxxxxxxxxxxFbwz"
    # body_template:
    #   user_id: 123456789
    #   message: "{{message}}"

    # ===================================================
    # 【配置示例 3：通过 POST 调用钉钉群机器人 (依赖自定义关键词)】
    # ===================================================
    # 关键词设置提示：必须在钉钉群机器人的安全设置中，添加自定义关键词 "森空岛"。    
    # url: "https://oapi.dingtalk.com/robot/send?access_token=31bbfxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx2c10"
    # method: "POST"
    # headers:
    #   Content-Type: "application/json"
    # body_template:
    #   msgtype: "text"
    #   text:
    #     content: "{{message}}"